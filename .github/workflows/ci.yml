name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libasound2-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall agents apps assistant config core interfaces repositories scripts services tests utils voice main.py

      - name: Unit tests
        run: python -m unittest discover tests

      - name: Doctor smoke
        run: python scripts/doctor.py --strict --quiet
        env:
          VASYA_API_AUTH_TOKEN: ci-test-token
          GOOGLE_CALENDAR_ENABLED: "false"
