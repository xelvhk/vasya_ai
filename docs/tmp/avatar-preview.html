<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vasya Avatar Preview</title>
  <style>
    body { margin: 0; background: linear-gradient(135deg,#0f172a,#1e3a8a); display: grid; place-items: center; min-height: 100vh; font-family: Arial, sans-serif; color: #e2e8f0; }
    .wrap { width: 760px; text-align: center; }
    img { width: 320px; height: 320px; filter: drop-shadow(0 12px 30px rgba(0,0,0,.35)); }
    h1 { margin: 16px 0 6px; font-size: 30px; }
    p { margin: 0; opacity: .9; }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="../../assets/vasya_avatar.svg" alt="Vasya avatar" />
    <h1>Vasya Avatar Widget</h1>
    <p>Desktop companion visual state preview</p>
  </div>
</body>
</html>
